interface:
  display_name: "Feishu Knowledge Capture"
  short_description: "Capture single or batch support cases into candidate Wiki knowledge."
  default_prompt: "Use $feishu-knowledge-capture to turn a single support case, supportman output, JSWO work-order group, or Feishu chat scope into candidate FAQ/fault/SOP/Pending knowledge; dedupe by work order, record roles, label maturity, write candidate drafts to Feishu Wiki, and archive Markdown snapshots to GitHub."
