interface:
  display_name: "Feishu Knowledge Capture"
  short_description: "Capture selected Feishu support material into personal case notes."
  default_prompt: "Use $feishu-knowledge-capture to turn selected Feishu chats, visible work-order groups, message links, or pasted case summaries into high-quality personal case notes; prioritize the case document, update only a lightweight personal index, and archive generated Markdown snapshots when configured."
